services:
  api:
    build: ./api-service
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /data/facepulse.db
      # macOS dev: face-service runs natively → use host.docker.internal
      # Linux/RPi: face-service in Docker → use http://face-service:8000
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face-service:8000}
    volumes:
      - face-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  face-service:
    build: ./face-service
    environment:
      FACE_BACKEND: onnx
      API_SERVICE_URL: http://api:8080
      CAMERA_SOURCE: ${CAMERA_SOURCE:-0}
      CAMERA_FPS: ${CAMERA_FPS:-5}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.5}
    depends_on:
      api:
        condition: service_healthy
    # Camera passthrough — works on Linux; on macOS run face-service natively
    # devices:
    #   - /dev/video0:/dev/video0
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/facepulse.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  face-data:
  prometheus-data:
  grafana-data:
