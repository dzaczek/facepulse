services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: facepulse
      POSTGRES_PASSWORD: facepulse
      POSTGRES_DB: facepulse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facepulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./api-service
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://facepulse:facepulse@postgres:5432/facepulse?sslmode=disable
      DATA_DIR: /data
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face-service:8000}
    volumes:
      - face-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  face-service:
    build: ./face-service
    ports:
      - "8000:8000"
    environment:
      FACE_BACKEND: onnx
      API_SERVICE_URL: http://api:8080
      CAMERA_SOURCE: ${CAMERA_SOURCE:-0}
    depends_on:
      api:
        condition: service_healthy
    # Uncomment on Linux for camera passthrough:
    # devices:
    #   - /dev/video0:/dev/video0
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/facepulse.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  face-data:
  grafana-data:
